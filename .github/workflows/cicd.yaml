name: CI/CD Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'source/**'
      - 'Dockerfile'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/python-app:${{ github.run_id }}

  cd:
    needs: ci
    runs-on: kind-runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Argo CD CLI
        run: |
          curl -ksSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd
          argocd version --client

      - name: Update Helm image tag
        run: |
          sed -i 's|^  tag: .*|  tag: "${{ github.run_id }}"|' charts/python-app/values.yaml
          grep -n '^  tag:' charts/python-app/values.yaml

      - name: Commit and push Helm values
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update python-app image tag to ${{ github.run_id }}
          file_pattern: charts/python-app/values.yaml

      - name: Log in to Argo CD
        run: |
          argocd login argocd-server.argocd.svc.cluster.local:80 \
            --username admin \
            --password "${{ secrets.ARGOCD_PASSWORD }}" \
            --plaintext

      - name: Sync python-app
        run: |
          argocd app sync python-app
          argocd app wait python-app --health --sync
