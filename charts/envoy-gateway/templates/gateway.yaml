apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
spec:
  gatewayClassName: {{ .Values.gatewayClass.name }}
  listeners:
    - name: http
      protocol: {{ .Values.gateway.protocol }}
      port: {{ .Values.gateway.port }}
      allowedRoutes:
        namespaces:
          from: All
